<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDA Voice Benchmark - Week 3</title>
    <style>
        /* --- CSS เดิมของเจแปน --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        /* --- ส่วนที่เพิ่มใหม่: Engine Selector --- */
        .engine-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            background: #f0f2f5;
            padding: 10px;
            border-radius: 12px;
        }

        .engine-btn {
            padding: 8px 15px;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 14px;
        }

        .engine-btn.active {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .engine-btn:not(.active) {
            background: white;
            color: #666;
        }

        /* --- CSS เดิม(ต่อ) --- */
        #micButton {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        #micButton:hover {
            transform: scale(1.1);
        }

        #micButton.listening {
            background: #f44336;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #status {
            margin: 20px 0;
            font-size: 16px;
            color: #666;
            min-height: 24px;
        }

        #status.listening { color: #f44336; font-weight: bold; }
        #status.success { color: #4CAF50; font-weight: bold; }
        #status.error { color: #f44336; }

        #transcript {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            min-height: 100px;
            display: none;
            text-align: left;
        }

        #transcript.show { display: block; }
        #transcript h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        #transcriptText { color: #333; font-size: 18px; line-height: 1.6; word-wrap: break-word; }

        .info { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AIDA Voice Control</h1>

        <div class="engine-selector">
            <button id="btn5001" class="engine-btn active" onclick="setEngine('5001')">gTTS (5001)</button>
            <button id="btn5002" class="engine-btn" onclick="setEngine('5002')">Edge-TTS (5002)</button>
        </div>
        
        <button id="micButton">🎤</button>
        
        <div id="status">เลือกโมเดลและกดปุ่มไมค์เพื่อเริ่มพูด</div>
        
        <div id="transcript">
            <h3>ประโยคที่พูด:</h3>
            <div id="transcriptText"></div>
        </div>
        
        <div class="info">
            Model: <span id="currentEngineDisplay">gTTS (Google)</span>
        </div>
    </div>

    <script src="speech.js"></script>
    <script>
        // ฟังก์ชันเสริมสำหรับจัดการ UI ของปุ่มสลับโมเดล
        function setEngine(port) {
            // เรียกฟังก์ชันใน speech.js
            if (typeof switchEngine === "function") {
                switchEngine(port);
                
                // อัปเดต UI ปุ่ม
                document.querySelectorAll('.engine-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('btn' + port).classList.add('active');
                
                // อัปเดตข้อความแสดงสถานะ
                const displayName = port === '5001' ? 'gTTS (Google)' : 'Edge-TTS (Microsoft)';
                document.getElementById('currentEngineDisplay').textContent = displayName;
            }
        }
    </script>
</body>
</html>
