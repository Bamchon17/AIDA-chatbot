<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Speech to Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        #micButton {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        #micButton:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }

        #micButton.listening {
            background: #f44336;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        #status {
            margin: 20px 0;
            font-size: 16px;
            color: #666;
            min-height: 24px;
        }

        #status.listening {
            color: #f44336;
            font-weight: bold;
        }

        #status.success {
            color: #4CAF50;
            font-weight: bold;
        }

        #status.error {
            color: #f44336;
        }

        #transcript {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            min-height: 100px;
            display: none;
        }

        #transcript.show {
            display: block;
        }

        #transcript h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #transcriptText {
            color: #333;
            font-size: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Thai Speech to Text</h1>
        
        <button id="micButton">🎤</button>
        
        <div id="status">กดปุ่มไมค์เพื่อเริ่มพูด</div>
        
        <div id="transcript">
            <h3>ผลลัพธ์:</h3>
            <div id="transcriptText"></div>
        </div>
        
        <div class="info">
            ใช้ Chrome หรือ Edge เพื่อประสบการณ์ที่ดีที่สุด
        </div>
    </div>

    <script src="speech.js"></script>
</body>
</html>
